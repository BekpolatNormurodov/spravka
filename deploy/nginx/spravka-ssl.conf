# Spravka — :443. Install to /etc/nginx/conf.d/spravka-ssl.conf
#
# ONLY AFTER setup-ssl.sh has issued the certificate. nginx will not start while
# ssl_certificate points at a file that does not exist.
#
#   yurist.qrsystem.uz  -> 127.0.0.1:5101
#   admin.qrsystem.uz   -> 127.0.0.1:5102
#   rahbar.qrsystem.uz  -> 127.0.0.1:5103
#   bright.qrsystem.uz  -> 127.0.0.1:5000   (web-qr)
#   PUBLIC_DOMAIN       -> 127.0.0.1:5100   (not chosen yet — see README)

# Empty (not "close") on ordinary requests: that removes the Connection header
# entirely so the upstream keepalive pool below is actually used.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

upstream spravka_qr     { server 127.0.0.1:5000; keepalive 16; }
upstream spravka_public { server 127.0.0.1:5100; keepalive 16; }
upstream spravka_yurist { server 127.0.0.1:5101; keepalive 16; }
upstream spravka_admin  { server 127.0.0.1:5102; keepalive 16; }
upstream spravka_rahbar { server 127.0.0.1:5103; keepalive 16; }

# `listen 443 ssl http2` on purpose, not the newer `http2 on;`: that directive
# needs nginx >= 1.25.1 and is a hard startup error below it (Ubuntu 24.04 ships
# 1.24, Debian 12 ships 1.22). This form works on every version still in use.
#
# HSTS is deliberately absent until the certs are confirmed working: a browser
# remembers it for the whole max-age and there is no way to take it back.

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yurist.qrsystem.uz;

    ssl_certificate     /etc/letsencrypt/live/qrsystem.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qrsystem.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 10M;

    location / {
        proxy_pass http://spravka_yurist;
        include snippets/spravka-proxy.conf;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.qrsystem.uz;

    ssl_certificate     /etc/letsencrypt/live/qrsystem.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qrsystem.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 10M;

    location / {
        proxy_pass http://spravka_admin;
        include snippets/spravka-proxy.conf;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rahbar.qrsystem.uz;

    ssl_certificate     /etc/letsencrypt/live/qrsystem.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qrsystem.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 10M;

    location / {
        proxy_pass http://spravka_rahbar;
        include snippets/spravka-proxy.conf;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bright.qrsystem.uz www.bright.qrsystem.uz;

    ssl_certificate     /etc/letsencrypt/live/qrsystem.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qrsystem.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # QR uploads carry files, not just links.
    client_max_body_size 30M;

    # Generated QR PNGs and uploads come straight off disk.
    #
    # This is not an optimisation — it is load-bearing. Next only serves the
    # public/ files that existed when the process started, so a QR generated at
    # runtime 404s until the next restart. Proven on this box: a PNG written
    # before start returns 200, one written after returns 404, same directory.
    location /qr/ {
        alias /opt/spravka/apps/web-qr/public/qr/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location /uploads/ {
        alias /opt/spravka/apps/web-qr/public/uploads/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://spravka_qr;
        include snippets/spravka-proxy.conf;
    }
}

# ---------------------------------------------------------------------------
# PUBLIC (web-public, :5100) — the page a printed QR opens.
#
# The apex, deliberately: this URL is burned into every printed QR and an issued
# maʼlumotnoma cannot be re-printed, so it is the shortest and most permanent
# name available. It must match NEXT_PUBLIC_PUBLIC_URL, which Next bakes in at
# BUILD time — set the .env before building, not after.
#
# No www.qrsystem.uz: it has no DNS record, so it is not in setup-ssl.sh's DOMAINS
# and the certificate does not cover it. Naming it here would promise a host that
# answers with a TLS warning. To add it: DNS record first, then DOMAINS, then here.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name qrsystem.uz;

    ssl_certificate     /etc/letsencrypt/live/qrsystem.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qrsystem.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # No X-Frame-Options: a public verification page is fair to embed.

    # /m/<id>/pdf streams the frozen document — a few hundred KB, but give the
    # render room: the first request for a document signed before it was frozen
    # renders it on the spot, and Chromium takes a couple of seconds.
    proxy_read_timeout 60s;

    location / {
        proxy_pass http://spravka_public;
        include snippets/spravka-proxy.conf;
    }
}
