# Spravka — nginx inside compose, terminating TLS. Mounted read-only at
# /etc/nginx/conf.d/default.conf.
#
# One file for both :80 and :443, which only works because init-letsencrypt.sh writes a dummy
# self-signed certificate BEFORE nginx first starts. nginx refuses to boot when ssl_certificate
# points at a missing file, and certbot cannot get the real one without nginx serving the ACME
# challenge — the dummy breaks that circle. Same approach as credit-core.

# Docker's embedded DNS. The resolver plus the variables below make nginx look the upstream up per
# request instead of once at startup. Two things this buys, both of which have bitten real setups:
# nginx starts even when an app container is down (a static proxy_pass fails hard with "host not
# found in upstream"), and a container that restarts with a new IP is followed rather than 502'd at
# the old address forever.
resolver 127.0.0.11 valid=10s ipv6=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# ── :80 — ACME challenge, and nothing else stays here ────────────────────────────────────────────
# Kept for good: renewal re-runs http-01 every 60 days and needs this exact path.
server {
    listen 80;
    listen [::]:80;
    server_name qrsystem.uz www.qrsystem.uz yurist.qrsystem.uz admin.qrsystem.uz rahbar.qrsystem.uz bright.qrsystem.uz;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── :443 catch-all — must come first ─────────────────────────────────────────────────────────────
# Without a default_server, nginx answers an unknown Host with whichever :443 block loaded first —
# which would be yurist, the internal legal panel. So the bare IP, every scanner and every typo
# would land on its login behind a certificate-name warning. The login still gates it, but that is
# not a thing to be reachable by accident.
#
# 444: close without a response. There is nothing to say to a request for a name we do not serve.
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/live/qrsystem.uz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/qrsystem.uz/privkey.pem;

    return 444;
}

# ── PUBLIC (:5100) — the page a printed QR opens ─────────────────────────────────────────────────
# The apex, deliberately: this URL is burned into every printed maʼlumotnoma and an issued one
# cannot be re-printed, so it is the shortest and most permanent name available. It must match
# NEXT_PUBLIC_PUBLIC_URL, which Next bakes in at BUILD time.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name qrsystem.uz www.qrsystem.uz;

    ssl_certificate     /etc/nginx/certs/live/qrsystem.uz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/qrsystem.uz/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # No X-Frame-Options: a public verification page is fair to embed.

    location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; }

    # /m/<id>/pdf streams the frozen document — a few hundred KB, but give the render room: the
    # first request for a document signed before it was frozen renders it on the spot, and
    # Chromium takes a couple of seconds.
    proxy_read_timeout 60s;

    location / {
        set $up public;
        proxy_pass http://$up:5100;
        include /etc/nginx/snippets/spravka-proxy.conf;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yurist.qrsystem.uz;

    ssl_certificate     /etc/nginx/certs/live/qrsystem.uz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/qrsystem.uz/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 10M;
    location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        set $up yurist;
        proxy_pass http://$up:5101;
        include /etc/nginx/snippets/spravka-proxy.conf;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.qrsystem.uz;

    ssl_certificate     /etc/nginx/certs/live/qrsystem.uz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/qrsystem.uz/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # The admin attaches files to an ariza: packages/shared/src/attachments/rules.ts allows 10 per
    # ariza at 10 MiB each, read from ONE multipart request — so the body can be ~100 MiB. At 10M
    # nginx 413'd before Next ever ran and the admin got nginx's raw HTML instead of the app's own
    # Uzbek error. Headroom over 100 MiB is deliberate: the app's limit should do the refusing.
    client_max_body_size 120M;
    location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        set $up admin;
        proxy_pass http://$up:5102;
        include /etc/nginx/snippets/spravka-proxy.conf;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name rahbar.qrsystem.uz;

    ssl_certificate     /etc/nginx/certs/live/qrsystem.uz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/qrsystem.uz/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 10M;
    location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; }

    # Signing renders the PDF with Chromium before the response comes back.
    proxy_read_timeout 120s;

    location / {
        set $up rahbar;
        proxy_pass http://$up:5103;
        include /etc/nginx/snippets/spravka-proxy.conf;
    }
}

# ── BRIGHT (:5000, qrcode-pro) — the one name here that is NOT spravka ─────────────────────────────
# qrcode-pro is co-hosted on this host and all six names resolve here, so this nginx is the single
# edge and has to serve bright too. It proxies to qrcode-app and serves /qr/ and /uploads/ straight
# off qrcode's own volumes (mounted read-only in the compose) — Next standalone does not serve
# runtime-written public files, so this is what qrcode-nginx did, moved here unchanged. qrcode-app,
# its database and its volumes are untouched; only qrcode-nginx is retired.
#
# If bright shows no QR images after cutover, qrcode's database on THIS server is empty — the data
# still lives on the old machine and has to be migrated. That is a data problem, not this config.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bright.qrsystem.uz;

    ssl_certificate     /etc/nginx/certs/live/qrsystem.uz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/qrsystem.uz/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 30M;
    location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; }

    # Runtime-written QR images and uploads, off qrcode's volumes. Must come before `location /`,
    # or the proxy would swallow them and Next would 404 every printed QR.
    location /qr/ {
        alias /srv/qr/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
    location /uploads/ {
        alias /srv/uploads/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Everything else — pages, /api/, build-time /_next/static/ — is Next's to serve.
    location / {
        set $up qrcode-app;
        proxy_pass http://$up:5000;
        include /etc/nginx/snippets/spravka-proxy.conf;
    }
}
