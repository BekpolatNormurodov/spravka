# Spravka — :80. Install to /etc/nginx/conf.d/spravka-http.conf
#
# Install this one FIRST, before any certificate exists. spravka-ssl.conf names
# files under /etc/letsencrypt/live/, and nginx refuses to start when they are
# missing — so certbot could never run to create them. This block is what serves
# the ACME challenge that brings those files into existence.
#
# It also stays for good: renewal re-runs HTTP-01 and needs :80 just the same.

server {
    listen 80;
    listen [::]:80;
    # qrsystem.uz is web-public — the page a printed QR opens. On this list for the same reason
    # as the rest (ACME + the redirect to https), and its certificate matters more than any
    # other: a scanned QR landing on a TLS warning is worse than one that does not resolve.
    #
    # All seven names, and they must match setup-ssl.sh's DOMAINS exactly: certbot fetches the
    # ACME challenge over every one of them, and a name that does not answer here fails the whole
    # request — all seven certificates, not just that name.
    server_name qrsystem.uz www.qrsystem.uz
                yurist.qrsystem.uz admin.qrsystem.uz rahbar.qrsystem.uz
                bright.qrsystem.uz www.bright.qrsystem.uz;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
