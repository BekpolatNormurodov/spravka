# Spravka — :80. Install to /etc/nginx/conf.d/spravka-http.conf
#
# Install this one FIRST, before any certificate exists. spravka-ssl.conf names
# files under /etc/letsencrypt/live/, and nginx refuses to start when they are
# missing — so certbot could never run to create them. This block is what serves
# the ACME challenge that brings those files into existence.
#
# It also stays for good: renewal re-runs HTTP-01 and needs :80 just the same.

server {
    listen 80;
    listen [::]:80;
    server_name yurist.qrsystem.uz admin.qrsystem.uz rahbar.qrsystem.uz;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
