# Shared proxy settings for every Next.js upstream.
# Mounted read-only into the nginx container at /etc/nginx/snippets/spravka-proxy.conf.

proxy_http_version 1.1;

proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
# Next.js reads this to know it is behind TLS. Without it, any absolute URL it
# builds comes out http:// and the browser blocks it as mixed content.
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;

# $connection_upgrade comes from the map in default.conf. On an ordinary request
# it expands to empty, which *removes* the Connection header rather than sending
# "close" — which would tear down the connection on every request.
proxy_set_header Upgrade    $http_upgrade;
proxy_set_header Connection $connection_upgrade;

proxy_cache_bypass $http_upgrade;
proxy_read_timeout    90s;
proxy_connect_timeout 60s;
proxy_send_timeout    90s;
